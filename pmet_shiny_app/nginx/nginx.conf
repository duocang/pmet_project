events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS — re-resolve upstream hostnames at runtime so
    # rebuilding api/frontend doesn't strand nginx on a stale container IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        server_name _;

        # Frontend
        location / {
            set $frontend_upstream "frontend:3000";
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # API
        location /api/ {
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Large file uploads
            client_max_body_size 500M;
            proxy_read_timeout 300s;
        }

        # Health endpoint
        location /health {
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream/health;
        }

        # Result files
        location /result/ {
            alias /var/www/result/;
            autoindex on;
        }
    }
}
