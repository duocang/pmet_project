<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrowR" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <marker id="arrowL" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#b07040" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="500" y="35" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">基因结构元素位置示意图</text>

  <!-- ============ POSITIVE STRAND ============ -->
  <text x="500" y="75" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a6e1a">正链基因 (+ strand)  — 以 AT1G01010 为例</text>

  <!-- Coordinate axis -->
  <line x1="60" y1="240" x2="940" y2="240" stroke="#999" stroke-width="1"/>
  <text x="60" y="258" text-anchor="middle" font-size="11" fill="#666">5'</text>
  <text x="940" y="258" text-anchor="middle" font-size="11" fill="#666">3'</text>
  <text x="500" y="258" text-anchor="middle" font-size="11" fill="#999">基因组坐标方向 →</text>

  <!-- Promoter region -->
  <rect x="60" y="140" width="120" height="36" rx="4" fill="url(#hatch)" stroke="#b07040" stroke-width="1.5" opacity="0.7"/>
  <text x="120" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b4513">启动子</text>
  <text x="120" y="193" text-anchor="middle" font-size="10" fill="#8b4513">TSS 上游</text>

  <!-- TSS arrow -->
  <line x1="180" y1="130" x2="180" y2="180" stroke="#d32f2f" stroke-width="2"/>
  <polygon points="175,130 180,118 185,130" fill="#d32f2f"/>
  <text x="180" y="112" text-anchor="middle" font-size="11" font-weight="bold" fill="#d32f2f">TSS</text>

  <!-- Transcription direction arrow -->
  <line x1="185" y1="100" x2="280" y2="100" stroke="#1a6e1a" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="233" y="95" text-anchor="middle" font-size="10" fill="#1a6e1a">转录方向</text>

  <!-- 5'UTR -->
  <rect x="180" y="140" width="70" height="36" rx="3" fill="#81d4fa" stroke="#0288d1" stroke-width="1.5"/>
  <text x="215" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#01579b">5'UTR</text>

  <!-- Exon 1 (CDS) -->
  <rect x="250" y="132" width="80" height="52" rx="3" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="290" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子1</text>
  <text x="290" y="170" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- Intron 1 -->
  <line x1="330" y1="158" x2="380" y2="140" stroke="#888" stroke-width="1.5"/>
  <line x1="380" y1="140" x2="430" y2="158" stroke="#888" stroke-width="1.5"/>
  <text x="380" y="133" text-anchor="middle" font-size="10" fill="#888">内含子</text>

  <!-- Exon 2 (CDS) -->
  <rect x="430" y="132" width="80" height="52" rx="3" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="470" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子2</text>
  <text x="470" y="170" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- Intron 2 -->
  <line x1="510" y1="158" x2="560" y2="140" stroke="#888" stroke-width="1.5"/>
  <line x1="560" y1="140" x2="610" y2="158" stroke="#888" stroke-width="1.5"/>
  <text x="560" y="133" text-anchor="middle" font-size="10" fill="#888">内含子</text>

  <!-- Exon 3 (CDS) -->
  <rect x="610" y="132" width="80" height="52" rx="3" fill="#66bb6a" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="650" y="155" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子3</text>
  <text x="650" y="170" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- 3'UTR -->
  <rect x="690" y="140" width="70" height="36" rx="3" fill="#ffcc80" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="725" y="163" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">3'UTR</text>

  <!-- Poly-A -->
  <text x="775" y="163" text-anchor="start" font-size="11" fill="#ef6c00">AAAA...</text>

  <!-- Coordinate labels for + strand -->
  <text x="180" y="210" text-anchor="middle" font-size="10" fill="#555">3631</text>
  <line x1="180" y1="176" x2="180" y2="200" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="760" y="210" text-anchor="middle" font-size="10" fill="#555">5899</text>
  <line x1="760" y1="176" x2="760" y2="200" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Gene span bracket -->
  <line x1="180" y1="220" x2="760" y2="220" stroke="#555" stroke-width="1.2"/>
  <line x1="180" y1="216" x2="180" y2="224" stroke="#555" stroke-width="1.2"/>
  <line x1="760" y1="216" x2="760" y2="224" stroke="#555" stroke-width="1.2"/>
  <text x="470" y="235" text-anchor="middle" font-size="10" fill="#555">gene 区间</text>


  <!-- ============ NEGATIVE STRAND ============ -->
  <text x="500" y="310" text-anchor="middle" font-size="16" font-weight="bold" fill="#c62828">负链基因 (- strand)  — 以 AT1G01020 为例</text>

  <!-- Coordinate axis -->
  <line x1="60" y1="480" x2="940" y2="480" stroke="#999" stroke-width="1"/>
  <text x="60" y="498" text-anchor="middle" font-size="11" fill="#666">小坐标</text>
  <text x="940" y="498" text-anchor="middle" font-size="11" fill="#666">大坐标</text>
  <text x="500" y="498" text-anchor="middle" font-size="11" fill="#999">基因组坐标方向 →</text>

  <!-- 3'UTR (left side for - strand) -->
  <rect x="140" y="380" width="70" height="36" rx="3" fill="#ffcc80" stroke="#ef6c00" stroke-width="1.5"/>
  <text x="175" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#bf360c">3'UTR</text>

  <!-- Exon 3 (CDS) - leftmost exon -->
  <rect x="210" y="372" width="80" height="52" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="250" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子</text>
  <text x="250" y="410" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- Intron -->
  <line x1="290" y1="398" x2="340" y2="380" stroke="#888" stroke-width="1.5"/>
  <line x1="340" y1="380" x2="390" y2="398" stroke="#888" stroke-width="1.5"/>
  <text x="340" y="373" text-anchor="middle" font-size="10" fill="#888">内含子</text>

  <!-- Exon 2 (CDS) -->
  <rect x="390" y="372" width="80" height="52" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="430" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子</text>
  <text x="430" y="410" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- Intron -->
  <line x1="470" y1="398" x2="520" y2="380" stroke="#888" stroke-width="1.5"/>
  <line x1="520" y1="380" x2="570" y2="398" stroke="#888" stroke-width="1.5"/>
  <text x="520" y="373" text-anchor="middle" font-size="10" fill="#888">内含子</text>

  <!-- Exon 1 (CDS) -->
  <rect x="570" y="372" width="80" height="52" rx="3" fill="#ef5350" stroke="#b71c1c" stroke-width="1.5"/>
  <text x="610" y="395" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">外显子</text>
  <text x="610" y="410" text-anchor="middle" font-size="10" fill="#fff">(CDS)</text>

  <!-- 5'UTR (right side for - strand) -->
  <rect x="650" y="380" width="70" height="36" rx="3" fill="#81d4fa" stroke="#0288d1" stroke-width="1.5"/>
  <text x="685" y="403" text-anchor="middle" font-size="11" font-weight="bold" fill="#01579b">5'UTR</text>

  <!-- TSS arrow (right side for - strand) -->
  <line x1="720" y1="370" x2="720" y2="420" stroke="#d32f2f" stroke-width="2"/>
  <polygon points="715,370 720,358 725,370" fill="#d32f2f"/>
  <text x="720" y="352" text-anchor="middle" font-size="11" font-weight="bold" fill="#d32f2f">TSS</text>

  <!-- Transcription direction arrow (leftward for - strand) -->
  <line x1="715" y1="340" x2="620" y2="340" stroke="#c62828" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="668" y="335" text-anchor="middle" font-size="10" fill="#c62828">转录方向 ←</text>

  <!-- Promoter region (right side for - strand) -->
  <rect x="725" y="380" width="120" height="36" rx="4" fill="url(#hatch)" stroke="#b07040" stroke-width="1.5" opacity="0.7"/>
  <text x="785" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#8b4513">启动子</text>
  <text x="785" y="433" text-anchor="middle" font-size="10" fill="#8b4513">TSS 上游（大坐标方向）</text>

  <!-- Coordinate labels for - strand -->
  <text x="140" y="450" text-anchor="middle" font-size="10" fill="#555">6788</text>
  <line x1="140" y1="416" x2="140" y2="440" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="720" y="450" text-anchor="middle" font-size="10" fill="#555">9130</text>
  <line x1="720" y1="416" x2="720" y2="440" stroke="#aaa" stroke-width="0.8" stroke-dasharray="3,2"/>

  <!-- Gene span bracket -->
  <line x1="140" y1="460" x2="720" y2="460" stroke="#555" stroke-width="1.2"/>
  <line x1="140" y1="456" x2="140" y2="464" stroke="#555" stroke-width="1.2"/>
  <line x1="720" y1="456" x2="720" y2="464" stroke="#555" stroke-width="1.2"/>
  <text x="430" y="475" text-anchor="middle" font-size="10" fill="#555">gene 区间</text>

  <!-- Promoter end label -->
  <text x="845" y="450" text-anchor="middle" font-size="10" fill="#555">→ 11100</text>
  <text x="845" y="462" text-anchor="middle" font-size="9" fill="#888">(下一个基因前)</text>


  <!-- ============ LEGEND ============ -->
  <rect x="60" y="530" width="880" height="170" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="500" y="555" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">图例与要点</text>

  <!-- Legend items -->
  <rect x="90" y="570" width="30" height="16" rx="2" fill="url(#hatch)" stroke="#b07040" stroke-width="1"/>
  <text x="130" y="583" font-size="11" fill="#333">启动子（推断区域，TSS上游）</text>

  <rect x="90" y="595" width="30" height="16" rx="2" fill="#81d4fa" stroke="#0288d1" stroke-width="1"/>
  <text x="130" y="608" font-size="11" fill="#333">5'UTR（非翻译区）</text>

  <rect x="90" y="620" width="30" height="16" rx="2" fill="#66bb6a" stroke="#2e7d32" stroke-width="1"/>
  <text x="130" y="633" font-size="11" fill="#333">外显子 / CDS（正链）</text>

  <rect x="90" y="645" width="30" height="16" rx="2" fill="#ef5350" stroke="#b71c1c" stroke-width="1"/>
  <text x="130" y="658" font-size="11" fill="#333">外显子 / CDS（负链）</text>

  <rect x="90" y="670" width="30" height="16" rx="2" fill="#ffcc80" stroke="#ef6c00" stroke-width="1"/>
  <text x="130" y="683" font-size="11" fill="#333">3'UTR（非翻译区）</text>

  <!-- Key points -->
  <text x="520" y="583" font-size="11" fill="#333" font-weight="bold">关键区别：</text>
  <text x="520" y="603" font-size="11" fill="#555">• 正链基因：TSS 在左侧（小坐标端），启动子在更小坐标方向</text>
  <text x="520" y="623" font-size="11" fill="#555">• 负链基因：TSS 在右侧（大坐标端），启动子在更大坐标方向</text>
  <text x="520" y="643" font-size="11" fill="#555">• 转录方向：正链 → 右，负链 → 左</text>
  <text x="520" y="663" font-size="11" fill="#555">• mRNA 总是 5' → 3' 读取，但基因组坐标可以相反</text>
</svg>