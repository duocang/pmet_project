    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#b7791f" stroke-width="1.5"/>
    </pattern>
    <symbol id="motif" viewBox="0 0 20 16">
      <polygon points="10,0 20,16 0,16" fill="#0f766e" opacity="0.85"/>
    </symbol>
    <symbol id="motifGray" viewBox="0 0 20 16">
      <polygon points="10,0 20,16 0,16" fill="#cbd5e1" opacity="0.85"/>
    </symbol>
  </defs>

