<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 980" role="img" aria-labelledby="gapcn-title gapcn-desc" lang="zh-CN" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <title id="gapcn-title">启动子 Motif 扫描 — 有无 gap 对比</title>
  <desc id="gapcn-desc">A. Without Gap：扫描整段 1000 bp promoter，TSS 附近 100 bp 的核心启动子区（TATA box / Inr 等通用元件）也被扫到，产生大量低特异性 hit。B. With Gap（distance=100）：扫描 900 bp 的远端调控区，TSS 近端的 100 bp gap（虚线灰格 + 红 ✕ 的 motif hit）被排除，降低通用 motif 干扰，提高基因特异性 TF 结合位点的信噪比。两段都展示了正链与负链基因（负链镜像翻转）。Gap 距离由 05_promoter_gap.sh 的 -g 配置（默认 100 bp）。图例：填色三角=保留的 hit，灰三角带 ✕=排除的 hit，斜线纹理=扫描区域，虚线灰=gap 排除区域，蓝/绿/橙=5'UTR/CDS/3'UTR。</desc>
