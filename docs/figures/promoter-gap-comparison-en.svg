  <polygon points="615,698 620,686 625,698" fill="#b7791f"/>
  <text x="620" y="681" text-anchor="middle" font-size="11" font-weight="700" fill="#7a4d10">TSS</text>

  <rect x="620" y="706" width="50" height="40" rx="3" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="645" y="729" text-anchor="middle" font-size="9" font-weight="700" fill="#64748b">gap</text>
  <text x="645" y="763" text-anchor="middle" font-size="9" fill="#94a3b8">100bp</text>

  <use href="#motifGray" x="637" y="701" width="16" height="13"/>
  <line x1="639" y1="699" x2="653" y2="715" stroke="#64748b" stroke-width="2"/>
  <line x1="653" y1="699" x2="639" y2="715" stroke="#64748b" stroke-width="2"/>

  <rect x="670" y="706" width="330" height="40" rx="4" fill="url(#hatch)" stroke="#b7791f" stroke-width="1.2"/>
  <text x="835" y="731" text-anchor="middle" font-size="12" font-weight="700" fill="#7a4d10">Promoter (900 bp)</text>

  <use href="#motif" x="710" y="701" width="16" height="13"/>
  <use href="#motif" x="800" y="701" width="16" height="13"/>
  <use href="#motif" x="880" y="701" width="16" height="13"/>
  <use href="#motif" x="960" y="701" width="16" height="13"/>

  <g font-size="9" fill="#64748b">
    <text x="620" y="770" text-anchor="middle">TSS</text>
    <text x="670" y="770" text-anchor="middle">+100</text>
    <text x="1000" y="770" text-anchor="middle">+1000</text>
  </g>

  <line x1="670" y1="778" x2="1000" y2="778" stroke="#0f766e" stroke-width="2"/>
  <line x1="670" y1="774" x2="670" y2="782" stroke="#0f766e" stroke-width="2"/>
  <line x1="1000" y1="774" x2="1000" y2="782" stroke="#0f766e" stroke-width="2"/>
  <text x="835" y="789" text-anchor="middle" font-size="10" font-weight="700" fill="#0f766e">PMET Scan Range</text>
  <text x="835" y="802" text-anchor="middle" font-size="9" fill="#475569">(Core promoter excluded: TATA box, Inr, etc.)</text>

  <!-- Benefit box (primary wash) -->
  <rect x="50" y="815" width="1000" height="90" rx="6" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
  <text x="70" y="838" font-size="12" font-weight="700" fill="#134e4a">Benefit:</text>
  <text x="70" y="858" font-size="11" fill="#475569">Excludes the 100 bp core promoter region near the TSS (TATA box, Inr, and other universal elements), scanning only the distal regulatory region.</text>
  <text x="70" y="878" font-size="11" fill="#475569">Reduces interference from generic motifs, improving the enrichment signal for gene-specific transcription factor binding sites.</text>
  <text x="70" y="894" font-size="10" fill="#94a3b8">Gap distance is configurable via <tspan font-family="ui-monospace, SF Mono, Menlo, monospace">-g</tspan> in <tspan font-family="ui-monospace, SF Mono, Menlo, monospace">05_promoter_gap.sh</tspan> (default 100 bp).</text>

  <!-- Legend -->
  <rect x="50" y="910" width="1000" height="55" rx="6" fill="#f7faf9" stroke="#dbe5e8" stroke-width="1"/>
  <use href="#motif" x="70" y="928" width="14" height="11"/>
  <text x="92" y="938" font-size="10" fill="#475569">Retained motif hit</text>
  <use href="#motifGray" x="210" y="928" width="14" height="11"/>
  <line x1="212" y1="927" x2="224" y2="940" stroke="#64748b" stroke-width="1.5"/>
  <line x1="224" y1="927" x2="212" y2="940" stroke="#64748b" stroke-width="1.5"/>
  <text x="234" y="938" font-size="10" fill="#475569">Excluded motif hit</text>
  <rect x="380" y="927" width="24" height="14" rx="2" fill="url(#hatch)" stroke="#b7791f" stroke-width="1"/>
  <text x="412" y="938" font-size="10" fill="#475569">Scan region</text>
  <rect x="500" y="927" width="24" height="14" rx="2" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="532" y="938" font-size="10" fill="#475569">Gap (excluded region)</text>
  <rect x="670" y="927" width="24" height="14" rx="2" fill="#d4e3fc" stroke="#1f6feb" stroke-width="1"/>
  <text x="702" y="938" font-size="10" fill="#475569">5'UTR</text>
  <rect x="750" y="927" width="24" height="14" rx="2" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
  <text x="782" y="938" font-size="10" fill="#475569">CDS</text>
  <rect x="830" y="927" width="24" height="14" rx="2" fill="#fde9c6" stroke="#b7791f" stroke-width="1"/>
  <text x="862" y="938" font-size="10" fill="#475569">3'UTR</text>
</svg>
