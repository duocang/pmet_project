<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 770" font-family="Arial, sans-serif">
  <defs>
    <marker id="aGrey" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#616161"/>
    </marker>
    <marker id="aAmber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e65100"/>
    </marker>
    <marker id="aGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- White rounded background -->
  <rect x="0" y="0" width="1100" height="770" rx="14" fill="#ffffff"/>

  <!-- Title -->
  <text x="550" y="34" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">PMET — four workflows, one shared index schema</text>
  <text x="550" y="52" text-anchor="middle" font-size="11" font-style="italic" fill="#666">how each entry point feeds the same downstream engine</text>

  <!-- ============ TOP ROW: 4 entry-point boxes ============ -->
  <!-- promoter.sh -->
  <rect x="30" y="70" width="248" height="190" rx="8" fill="#ffffff" stroke="#1565c0" stroke-width="1.5"/>
  <rect x="30" y="70" width="248" height="32" rx="8" fill="#bbdefb"/>
  <text x="154" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#0d47a1" font-family="Menlo, Consolas, monospace">promoter.sh</text>
  <text x="50" y="120" font-size="10" font-weight="bold" fill="#0d47a1">inputs:</text>
  <text x="50" y="135" font-size="9" fill="#444">· genome FASTA</text>
  <text x="50" y="148" font-size="9" fill="#444">· GFF3 annotation</text>
  <text x="50" y="161" font-size="9" fill="#444">· MEME motifs</text>
  <text x="50" y="180" font-size="10" font-weight="bold" fill="#0d47a1">indexing:</text>
  <text x="50" y="195" font-size="9" fill="#444">· promoter extraction (~1 kb)</text>
  <text x="50" y="208" font-size="9" fill="#444">· FIMO + binomial cutoff</text>
  <text x="50" y="221" font-size="9" fill="#444">· per-gene top-k</text>
  <rect x="50" y="232" width="120" height="18" rx="3" fill="#e3f2fd" stroke="#90caf9"/>
  <text x="110" y="245" text-anchor="middle" font-size="9" fill="#0d47a1">web: <tspan font-family="Menlo, Consolas, monospace">/promoters</tspan></text>

  <!-- intervals.sh -->
  <rect x="293" y="70" width="248" height="190" rx="8" fill="#ffffff" stroke="#00838f" stroke-width="1.5"/>
  <rect x="293" y="70" width="248" height="32" rx="8" fill="#b2ebf2"/>
  <text x="417" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#006064" font-family="Menlo, Consolas, monospace">intervals.sh</text>
  <text x="313" y="120" font-size="10" font-weight="bold" fill="#006064">inputs:</text>
  <text x="313" y="135" font-size="9" fill="#444">· interval FASTA (peaks etc.)</text>
  <text x="313" y="148" font-size="9" fill="#444">· MEME motifs</text>
  <text x="313" y="161" font-size="9" fill="#444">· peak/interval list</text>
  <text x="313" y="180" font-size="10" font-weight="bold" fill="#006064">indexing:</text>
  <text x="313" y="195" font-size="9" fill="#444">· colon-sanitise headers</text>
  <text x="313" y="208" font-size="9" fill="#444">· FIMO + binomial cutoff</text>
  <text x="313" y="221" font-size="9" fill="#444">· per-interval top-k</text>
  <rect x="313" y="232" width="120" height="18" rx="3" fill="#e0f7fa" stroke="#80deea"/>
  <text x="373" y="245" text-anchor="middle" font-size="9" fill="#006064">web: <tspan font-family="Menlo, Consolas, monospace">/intervals</tspan></text>

  <!-- elements.sh -->
  <rect x="556" y="70" width="248" height="190" rx="8" fill="#ffffff" stroke="#4527a0" stroke-width="1.5"/>
  <rect x="556" y="70" width="248" height="32" rx="8" fill="#d1c4e9"/>
  <text x="680" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#311b92" font-family="Menlo, Consolas, monospace">elements.sh</text>
  <text x="576" y="120" font-size="10" font-weight="bold" fill="#311b92">inputs:</text>
  <text x="576" y="135" font-size="9" fill="#444">· genome FASTA + GFF3</text>
  <text x="576" y="148" font-size="9" fill="#444">· MEME motifs</text>
  <text x="576" y="161" font-size="9" fill="#444">· <tspan font-family="Menlo, Consolas, monospace">-e</tspan> element type, <tspan font-family="Menlo, Consolas, monospace">-s</tspan> strategy</text>
  <text x="576" y="180" font-size="10" font-weight="bold" fill="#311b92">indexing:</text>
  <text x="576" y="195" font-size="9" fill="#444">· per-element fragment tagging</text>
  <text x="576" y="208" font-size="9" fill="#444">· FIMO scan fragments</text>
  <text x="576" y="221" font-size="9" fill="#444">· collapse back to gene level</text>
  <rect x="576" y="232" width="100" height="18" rx="3" fill="#ede7f6" stroke="#b39ddb"/>
  <text x="626" y="245" text-anchor="middle" font-size="9" fill="#311b92">CLI only</text>

  <!-- pair_only.sh -->
  <rect x="819" y="70" width="248" height="190" rx="8" fill="#ffffff" stroke="#37474f" stroke-width="1.5" stroke-dasharray="6,3"/>
  <rect x="819" y="70" width="248" height="32" rx="8" fill="#cfd8dc"/>
  <text x="943" y="91" text-anchor="middle" font-size="13" font-weight="bold" fill="#263238" font-family="Menlo, Consolas, monospace">pair_only.sh</text>
  <text x="839" y="120" font-size="10" font-weight="bold" fill="#263238">inputs:</text>
  <text x="839" y="135" font-size="9" fill="#444">· existing homotypic index</text>
  <text x="839" y="148" font-size="9" fill="#444">  (<tspan font-style="italic">made by any of the 3 left</tspan>)</text>
  <text x="839" y="161" font-size="9" fill="#444">· user gene list</text>
  <text x="839" y="180" font-size="10" font-weight="bold" fill="#d32f2f">indexing:</text>
  <text x="839" y="195" font-size="9" font-style="italic" fill="#d32f2f">SKIPPED — re-uses an index</text>
  <text x="839" y="208" font-size="9" font-style="italic" fill="#d32f2f">already on disk</text>
  <rect x="839" y="232" width="160" height="18" rx="3" fill="#eceff1" stroke="#b0bec5"/>
  <text x="919" y="245" text-anchor="middle" font-size="9" fill="#263238">web: <tspan font-family="Menlo, Consolas, monospace">/promoters_pre</tspan></text>

  <!-- ============ Convergence arrows from top boxes to the central index ============ -->
  <!-- 3 indexing entries arrows down to index box at y=320 -->
  <line x1="154" y1="265" x2="154" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="154" y1="285" x2="350" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="350" y1="285" x2="350" y2="320" stroke="#616161" stroke-width="1.5" marker-end="url(#aGrey)"/>

  <line x1="417" y1="265" x2="417" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="417" y1="285" x2="450" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="450" y1="285" x2="450" y2="320" stroke="#616161" stroke-width="1.5" marker-end="url(#aGrey)"/>

  <line x1="680" y1="265" x2="680" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="680" y1="285" x2="550" y2="285" stroke="#616161" stroke-width="1.5"/>
  <line x1="550" y1="285" x2="550" y2="320" stroke="#616161" stroke-width="1.5" marker-end="url(#aGrey)"/>

  <!-- pair_only path: arrow from box → straight down → curls left to enter the index box from the right side -->
  <path d="M 943 265 L 943 360 L 870 360" fill="none" stroke="#37474f" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#aGrey)"/>
  <text x="950" y="318" font-size="9" font-style="italic" fill="#37474f">consumes existing</text>
  <text x="950" y="332" font-size="9" font-style="italic" fill="#37474f">index from disk</text>

  <!-- ============ Central homotypic index box ============ -->
  <rect x="230" y="325" width="640" height="160" rx="10" fill="#fff8e1" stroke="#f57f17" stroke-width="1.5"/>
  <rect x="230" y="325" width="640" height="32" rx="10" fill="#ffe082"/>
  <text x="550" y="346" text-anchor="middle" font-size="13" font-weight="bold" fill="#e65100">homotypic index — shared on-disk schema</text>
  <text x="250" y="372" font-size="10" font-style="italic" fill="#bf360c">contract: <tspan font-family="Menlo, Consolas, monospace">docs/methods/homotypic-contract.md</tspan></text>
  <text x="270" y="392" font-size="11" font-family="Menlo, Consolas, monospace" fill="#444">├─ fimohits/&lt;MOTIF&gt;.bin       <tspan fill="#888" font-style="italic" font-family="Arial">— per-motif binary hit list (PMETBN01)</tspan></text>
  <text x="270" y="408" font-size="11" font-family="Menlo, Consolas, monospace" fill="#444">├─ binomial_thresholds.txt   <tspan fill="#888" font-style="italic" font-family="Arial">— per-motif p-value cutoff</tspan></text>
  <text x="270" y="424" font-size="11" font-family="Menlo, Consolas, monospace" fill="#444">├─ IC.txt                    <tspan fill="#888" font-style="italic" font-family="Arial">— per-motif positional info-content</tspan></text>
  <text x="270" y="440" font-size="11" font-family="Menlo, Consolas, monospace" fill="#444">├─ universe.txt              <tspan fill="#888" font-style="italic" font-family="Arial">— gene/interval names</tspan></text>
  <text x="270" y="456" font-size="11" font-family="Menlo, Consolas, monospace" fill="#444">└─ promoter_lengths.txt      <tspan fill="#888" font-style="italic" font-family="Arial">— per-gene/interval length</tspan></text>
  <text x="550" y="476" text-anchor="middle" font-size="9" font-style="italic" fill="#888">all four workflows agree on this layout — verified by check_homotypic_contract.py</text>

  <!-- arrow down + "+ gene list" annotation -->
  <line x1="550" y1="490" x2="550" y2="525" stroke="#e65100" stroke-width="2" marker-end="url(#aAmber)"/>
  <rect x="585" y="497" width="170" height="20" rx="4" fill="#ffffff" stroke="#bbb"/>
  <text x="670" y="511" text-anchor="middle" font-size="10" fill="#444">+ user gene list (cluster of interest)</text>

  <!-- ============ Heterotypic pair test (shared engine) ============ -->
  <rect x="230" y="530" width="640" height="100" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="230" y="530" width="640" height="32" rx="10" fill="#a5d6a7"/>
  <text x="550" y="551" text-anchor="middle" font-size="13" font-weight="bold" fill="#1b5e20">Heterotypic pair test (shared engine)</text>
  <text x="550" y="580" text-anchor="middle" font-size="11" fill="#1b5e20">all four workflows shell out to <tspan font-family="Menlo, Consolas, monospace" font-weight="bold">build/pair_parallel</tspan></text>
  <text x="550" y="600" text-anchor="middle" font-size="11" fill="#1b5e20">per-cluster <tspan font-weight="bold">hypergeometric test</tspan>, gated by binomial pre-filter</text>
  <text x="550" y="617" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">+ Benjamini–Hochberg / Bonferroni multiple-testing correction</text>

  <!-- arrow down to output -->
  <line x1="550" y1="635" x2="550" y2="665" stroke="#2e7d32" stroke-width="2" marker-end="url(#aGreen)"/>

  <!-- ============ Output ============ -->
  <rect x="230" y="670" width="640" height="42" rx="8" fill="#ffffff" stroke="#37474f" stroke-width="1.5"/>
  <text x="550" y="689" text-anchor="middle" font-size="13" font-weight="bold" fill="#263238" font-family="Menlo, Consolas, monospace">motif_output.txt</text>
  <text x="550" y="705" text-anchor="middle" font-size="10" fill="#555">11 columns, sorted by <tspan font-family="Menlo, Consolas, monospace">adj_p_BH</tspan></text>

  <!-- Heatmap line as standalone footnote (outside output box) -->
  <text x="550" y="729" text-anchor="middle" font-size="9" font-style="italic" fill="#888">+ optional 3 heatmap PNGs — requires Rscript and the packages in <tspan font-family="Menlo, Consolas, monospace">pipeline/r/install_packages.R</tspan></text>

  <!-- Footer info-box -->
  <rect x="20" y="740" width="1060" height="22" rx="6" fill="#e3f2fd" stroke="#90caf9" stroke-width="1"/>
  <text x="40" y="755" font-size="10" fill="#0d47a1">
    <tspan font-weight="bold">Web app SCRIPT_MAP</tspan> (<tspan font-family="Menlo, Consolas, monospace">apps/pmet_backend/services/executor.py</tspan>): the backend dispatches user submissions to the right .sh based on the selected mode.
  </text>
</svg>
