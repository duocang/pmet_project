    <use href="#motifA" x="0" y="0" width="34" height="17"/><text x="42" y="13">motif A</text>
    <use href="#motifB" x="120" y="0" width="34" height="17"/><text x="162" y="13">motif B</text>
    <use href="#motifC" x="240" y="0" width="34" height="17"/><text x="282" y="13">motif C</text>
    <use href="#motifD" x="360" y="0" width="34" height="17"/><text x="402" y="13">motif D</text>
    <rect x="468" y="2" width="22" height="13" fill="#fdf6e7" stroke="#b7791f" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="496" y="13">promoter 区域</text>
  </g>

  <rect x="35" y="100" width="510" height="395" rx="10" fill="#eef8f6" stroke="#dbe5e8" stroke-width="1"/>
  <text x="60" y="128" font-size="17" font-weight="700" fill="#0f172a">目标基因集</text>
  <text x="60" y="147" font-size="11.5" fill="#475569">例：热激高表达基因 / 某细胞类型上调基因</text>

  <g transform="translate(408, 105)">
    <rect x="0" y="0" width="120" height="56" rx="6" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
    <use href="#motifA" x="22" y="10" width="28" height="18"/>
    <path d="M38 11 C50 1 70 1 82 11" fill="none" stroke="#0f766e" stroke-width="1.6"/>
    <use href="#motifB" x="70" y="10" width="28" height="18"/>
    <text x="60" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f766e">A+B pair</text>
  </g>

  <g transform="translate(132, 168)" stroke="#b7791f" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="0" y2="-5"/>
    <line x1="0" y1="-5" x2="244" y2="-5"/>
    <line x1="244" y1="-5" x2="244" y2="0"/>
    <text x="122" y="-9" text-anchor="middle" font-size="10.5" fill="#7a4d10" stroke="none">promoter 区域（TSS 上游 ~ 2 kb）</text>
  </g>

  <g font-size="11" font-weight="700" fill="#334155">
    <g transform="translate(60, 200)">
      <text x="0" y="5">Gene 1</text>
      <use href="#promoterRegion" x="72" y="0"/>
      <line x1="316" y1="0" x2="406" y2="0" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="316" y="-11" width="90" height="22" rx="3" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
      <text x="361" y="5" text-anchor="middle" font-size="10" fill="#134e4a">gene body</text>
      <path d="M316 5 L316 -20 L342 -20" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <text x="352" y="-16" font-size="10" fill="#7a4d10">TSS</text>
      <use href="#motifA" x="120" y="-10" width="38" height="19"/>
      <use href="#motifB" x="218" y="-10" width="38" height="19"/>
      <path d="M139 -16 C162 -32 214 -32 237 -16" fill="none" stroke="#0f766e" stroke-width="2"/>
    </g>
    <g transform="translate(60, 252)">
      <text x="0" y="5">Gene 2</text>
      <use href="#promoterRegion" x="72" y="0"/>
      <line x1="316" y1="0" x2="406" y2="0" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="316" y="-11" width="90" height="22" rx="3" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
      <path d="M316 5 L316 -20 L342 -20" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
