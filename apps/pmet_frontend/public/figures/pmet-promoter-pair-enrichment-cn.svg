  </g>

  <rect x="610" y="450" width="440" height="32" rx="6" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
  <text x="830" y="471" text-anchor="middle" font-size="12" fill="#475569">背景 6 个基因中 <tspan font-weight="700" fill="#334155">1 个</tspan> 含 A+B pair（17%）</text>

  <path d="M290 484 L380 522" fill="none" stroke="#0f766e" stroke-width="2" marker-end="url(#arrPrimary)"/>
  <path d="M830 484 L720 522" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrMuted)"/>

  <rect x="200" y="510" width="700" height="178" rx="10" fill="#ffffff" stroke="#dbe5e8" stroke-width="1" filter="url(#softShadow)"/>
  <text x="550" y="535" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">PMET pairing：对每个 motif pair 做富集检验</text>

  <g transform="translate(218, 548)">
    <rect x="0" y="0" width="252" height="128" rx="7" fill="#eef8f6" stroke="#dbe5e8" stroke-width="1"/>
    <text x="126" y="20" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">A+B pair 的 2×2 列联表</text>
    <g transform="translate(20, 32)" font-size="10" fill="#475569">
      <text x="115" y="14" text-anchor="middle">含 A+B</text>
      <text x="180" y="14" text-anchor="middle">不含</text>
      <rect x="0" y="20" width="60" height="26" fill="#ffffff" stroke="#dbe5e8"/>
      <text x="30" y="37" text-anchor="middle" font-size="10.5" fill="#0f766e" font-weight="700">目标集</text>
      <rect x="60" y="20" width="80" height="26" fill="#bdded8" stroke="#0f766e" stroke-width="0.8"/>
      <text x="100" y="38" text-anchor="middle" font-size="13" font-weight="700" fill="#134e4a">4</text>
      <rect x="140" y="20" width="80" height="26" fill="#ffffff" stroke="#dbe5e8"/>
      <text x="180" y="38" text-anchor="middle" font-size="12" fill="#334155">1</text>
      <rect x="0" y="46" width="60" height="26" fill="#ffffff" stroke="#dbe5e8"/>
      <text x="30" y="63" text-anchor="middle" font-size="10.5" fill="#64748b">背景</text>
      <rect x="60" y="46" width="80" height="26" fill="#ffffff" stroke="#dbe5e8"/>
      <text x="100" y="63" text-anchor="middle" font-size="12" fill="#334155">1</text>
      <rect x="140" y="46" width="80" height="26" fill="#f7faf9" stroke="#dbe5e8"/>
      <text x="180" y="63" text-anchor="middle" font-size="12" fill="#334155">5</text>
    </g>
    <text x="126" y="120" text-anchor="middle" font-size="10.5" fill="#475569">观测富集是否显著大于随机期望？</text>
  </g>

  <g transform="translate(490, 548)">
    <rect x="0" y="0" width="158" height="128" rx="7" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
    <text x="79" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">超几何检验</text>
    <text x="79" y="42" text-anchor="middle" font-size="10.5" fill="#64748b">P(X ≥ k | K, m, N)</text>
    <line x1="20" y1="58" x2="138" y2="58" stroke="#dbe5e8" stroke-width="1" stroke-dasharray="3,3"/>
    <text x="79" y="78" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0f172a">多重检验校正</text>
    <text x="79" y="96" text-anchor="middle" font-size="10.5" fill="#64748b">BH / Bonferroni</text>
    <text x="79" y="114" text-anchor="middle" font-size="10.5" fill="#64748b">→ adj.p</text>
  </g>

  <g transform="translate(668, 548)">
    <rect x="0" y="0" width="214" height="128" rx="7" fill="#fdf6e7" stroke="#dbe5e8" stroke-width="1"/>
    <text x="107" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#0f172a">按 adj.p 排序的 motif pair</text>
    <g font-size="10" fill="#64748b">
      <text x="14" y="42">pair</text>
      <text x="86" y="42">adj.p</text>
      <text x="140" y="42">−log10</text>
    </g>
    <line x1="12" y1="46" x2="202" y2="46" stroke="#dbe5e8" stroke-width="0.8"/>
    <text x="14" y="64" font-size="11" font-weight="700" fill="#0f766e">A + B</text>
    <text x="86" y="64" font-size="11" font-weight="700" fill="#0f766e">0.003</text>
    <rect x="140" y="55" width="60" height="11" rx="2" fill="#0f766e"/>
    <text x="14" y="86" font-size="11" fill="#334155">C + D</text>
    <text x="86" y="86" font-size="11" fill="#334155">0.21</text>
    <rect x="140" y="77" width="22" height="11" rx="2" fill="#b7791f"/>
    <text x="14" y="108" font-size="11" fill="#334155">A + C</text>
    <text x="86" y="108" font-size="11" fill="#334155">0.67</text>
