<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" role="img" aria-labelledby="paircn-title paircn-desc" lang="zh-CN" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', Arial, sans-serif">
  <title id="paircn-title">PMET：启动子中的 motif pair 富集示意</title>
  <desc id="paircn-desc">左面板为「目标基因集」：5 个基因的 promoter 区域中，4 个含 A+B pair（80%）。右面板为「全基因组 promoter 背景」：6 个基因里仅 1 个含 A+B（17%）。下方为统计检验面板：A+B 的 2×2 列联表（目标 4/1，背景 1/5）→ 超几何检验 P(X≥k | K, m, N) + BH/Bonferroni 校正得 adj.p → 按 adj.p 排序的 motif pair 结果表（A+B 显著富集）。注脚：A+B 表示两个 motif 在同一 promoter 内共现，不要求紧邻；重叠过多的 FIMO hit 会被过滤。</desc>
  <defs>
    <marker id="arrPrimary" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#0f766e"/>
    </marker>
    <marker id="arrMuted" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0, 9 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrTSS" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b7791f"/>
    </marker>
    <marker id="arrSlate" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#475569"/>
    </marker>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <symbol id="motifA" viewBox="0 0 46 22">
      <rect x="1" y="2" width="44" height="18" rx="4" fill="#fde9c6" stroke="#b7791f" stroke-width="1.2"/>
      <text x="23" y="15" text-anchor="middle" font-size="11" font-weight="700" fill="#7a4d10">A</text>
    </symbol>
    <symbol id="motifB" viewBox="0 0 46 22">
      <path d="M23 1 L45 11 L23 21 L1 11 Z" fill="#bdded8" stroke="#0f766e" stroke-width="1.2"/>
      <text x="23" y="15" text-anchor="middle" font-size="11" font-weight="700" fill="#134e4a">B</text>
    </symbol>
    <symbol id="motifC" viewBox="0 0 46 22">
      <rect x="1" y="2" width="44" height="18" rx="9" fill="#e0d4f0" stroke="#8a4cbe" stroke-width="1.2"/>
      <text x="23" y="15" text-anchor="middle" font-size="11" font-weight="700" fill="#5e2d8c">C</text>
    </symbol>
    <symbol id="motifD" viewBox="0 0 46 22">
      <polygon points="7,2 39,2 45,11 39,20 7,20 1,11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.2"/>
      <text x="23" y="15" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">D</text>
    </symbol>

    <symbol id="promoterRegion" overflow="visible">
      <rect x="0" y="-14" width="244" height="28" fill="#fdf6e7" stroke="#b7791f" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.7"/>
    </symbol>
    <symbol id="promoterRegionDim" overflow="visible">
      <rect x="0" y="-13" width="216" height="26" fill="#f7faf9" stroke="#dbe5e8" stroke-width="0.8" stroke-dasharray="4,3"/>
    </symbol>
  </defs>

  <rect x="0" y="0" width="1100" height="720" rx="14" fill="#ffffff"/>

  <text x="550" y="34" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">PMET：启动子中的 motif pair 富集</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#64748b">在目标基因集里，哪些 motif 对在 promoter 中共同出现的频率显著高于全基因组背景？</text>

