      <path d="M284 5 L284 -18 L308 -18" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <use href="#motifC" x="124" y="-9" width="36" height="18"/>
      <use href="#motifD" x="220" y="-9" width="36" height="18"/>
    </g>
    <g transform="translate(620, 388)">
      <text x="0" y="5">Gene e</text>
      <use href="#promoterRegionDim" x="68" y="0"/>
      <line x1="284" y1="0" x2="358" y2="0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
