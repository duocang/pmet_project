      <line x1="316" y1="0" x2="406" y2="0" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="316" y="-11" width="90" height="22" rx="3" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
      <path d="M316 5 L316 -20 L342 -20" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <use href="#motifA" x="146" y="-10" width="38" height="19"/>
      <use href="#motifB" x="248" y="-10" width="38" height="19"/>
      <path d="M165 -16 C188 -34 246 -34 267 -16" fill="none" stroke="#0f766e" stroke-width="2"/>
    </g>
    <g transform="translate(60, 356)">
      <text x="0" y="5">Gene 4</text>
      <use href="#promoterRegion" x="72" y="0"/>
      <line x1="316" y1="0" x2="406" y2="0" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="316" y="-11" width="90" height="22" rx="3" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
      <path d="M316 5 L316 -20 L342 -20" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <use href="#motifA" x="106" y="-10" width="38" height="19"/>
      <use href="#motifB" x="266" y="-10" width="38" height="19"/>
      <path d="M125 -16 C160 -42 252 -42 285 -16" fill="none" stroke="#0f766e" stroke-width="2"/>
    </g>
    <g transform="translate(60, 408)">
      <text x="0" y="5">Gene 5</text>
      <use href="#promoterRegion" x="72" y="0"/>
      <line x1="316" y1="0" x2="406" y2="0" stroke="#334155" stroke-width="2.5" stroke-linecap="round"/>
      <rect x="316" y="-11" width="90" height="22" rx="3" fill="#bdded8" stroke="#0f766e" stroke-width="1"/>
      <path d="M316 5 L316 -20 L342 -20" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <use href="#motifC" x="118" y="-10" width="38" height="19"/>
      <use href="#motifD" x="220" y="-10" width="38" height="19"/>
    </g>
  </g>

  <g>
    <text x="476" y="194" font-size="10.5" font-weight="700" fill="#0f766e">motif</text>
    <text x="476" y="208" font-size="10.5" font-weight="700" fill="#0f766e">pair</text>
    <path d="M472 195 C440 192 360 178 256 170" fill="none" stroke="#0f766e" stroke-width="1" stroke-dasharray="3,2"/>
    <circle cx="252" cy="168" r="1.8" fill="#0f766e"/>
  </g>

  <rect x="70" y="450" width="440" height="32" rx="6" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
  <text x="290" y="471" text-anchor="middle" font-size="12" fill="#475569">5 个目标基因中 <tspan font-weight="700" fill="#0f766e">4 个</tspan> 含 A+B pair（80%）</text>

  <rect x="595" y="100" width="470" height="395" rx="10" fill="#f7faf9" stroke="#dbe5e8" stroke-width="1"/>
  <text x="620" y="128" font-size="17" font-weight="700" fill="#0f172a">全基因组 promoter 背景</text>
  <text x="620" y="147" font-size="11.5" fill="#64748b">所有有可用 promoter 的基因构成 null universe</text>

  <g transform="translate(908, 105)">
    <rect x="0" y="0" width="140" height="56" rx="6" fill="#ffffff" stroke="#dbe5e8" stroke-width="1"/>
    <use href="#motifA" x="32" y="10" width="28" height="18"/>
    <path d="M48 11 C60 1 80 1 92 11" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="3,2"/>
    <use href="#motifB" x="80" y="10" width="28" height="18"/>
    <text x="70" y="46" text-anchor="middle" font-size="11.5" font-weight="700" fill="#475569">A+B 偶尔出现</text>
  </g>

  <g transform="translate(688, 168)" stroke="#94a3b8" stroke-width="1" fill="none">
    <line x1="0" y1="0" x2="0" y2="-5"/>
    <line x1="0" y1="-5" x2="216" y2="-5"/>
    <line x1="216" y1="-5" x2="216" y2="0"/>
    <text x="108" y="-9" text-anchor="middle" font-size="10.5" fill="#64748b" stroke="none">promoter 区域</text>
  </g>

  <g font-size="11" font-weight="700" fill="#475569">
    <g transform="translate(620, 200)">
      <text x="0" y="5">Gene a</text>
      <use href="#promoterRegionDim" x="68" y="0"/>
      <line x1="284" y1="0" x2="358" y2="0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
      <rect x="284" y="-10" width="74" height="20" rx="3" fill="#e2e8f0" stroke="#94a3b8" stroke-width="0.8"/>
      <path d="M284 5 L284 -18 L308 -18" fill="none" stroke="#b7791f" stroke-width="1.5" marker-end="url(#arrTSS)"/>
      <use href="#motifA" x="100" y="-9" width="36" height="18"/>
      <use href="#motifC" x="216" y="-9" width="36" height="18"/>
    </g>
    <g transform="translate(620, 247)">
      <text x="0" y="5">Gene b</text>
      <use href="#promoterRegionDim" x="68" y="0"/>
      <line x1="284" y1="0" x2="358" y2="0" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/>
