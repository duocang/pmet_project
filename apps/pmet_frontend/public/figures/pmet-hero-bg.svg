<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640"
     font-family="Arial, Helvetica, sans-serif">
  <!--
    PMET hero background — second pass.

    Goals over the previous revision:
      1. No text overflow. Every label fits inside its card; long
         captions wrap manually with <tspan dy>.
      2. No element overlap. The "n/N genes" verdict labels moved to
         a dedicated right column instead of sitting on top of motif
         hits. Pair arcs nudged so they do not graze the section
         caption.
      3. Tighter palette. Dropped pastel mint backdrop + bright rose
         + bright purple + clip-art DNA wave. Single neutral
         off-white background; motifs use a restrained four-hue
         family (teal / amber / indigo / slate) with subtle vertical
         gradients instead of flat fills, so shapes read as having
         a bit of depth.
      4. Quieter type. Card headers slightly larger but lower-
         contrast, captions a hair smaller. Generous internal
         padding inside cards.
  -->

  <defs>
    <!-- Background: tuned to the app palette in globals.css:
         primary teal (#0f766e), dark teal (#134e4a), muted slate,
         and a restrained amber accent (#b7791f). -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#f7faf9"/>
      <stop offset="58%"  stop-color="#eef4f3"/>
      <stop offset="100%" stop-color="#dfeceb"/>
    </linearGradient>
    <radialGradient id="rightGlow" cx="76%" cy="44%" r="62%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.72"/>
      <stop offset="58%" stop-color="#e8f4f1" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#dbe8e8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="leftQuiet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0b2f33" stop-opacity="0.36"/>
      <stop offset="28%" stop-color="#134e4a" stop-opacity="0.12"/>
      <stop offset="58%" stop-color="#134e4a" stop-opacity="0"/>
    </linearGradient>

    <!-- Card surface: translucent paper with a hairline border.
         The premium-feel trick is pale neutral strokes plus soft
         shadows, not saturated coloured outlines. -->
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="8" stdDeviation="13" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>

    <!-- Motif shapes. Each is a vertical micro-gradient (top to
         bottom) instead of a flat fill — a single subtle highlight
         is what separates "infographic clip-art" from "data-vis". -->
    <linearGradient id="mA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4bbeb4"/><stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="mB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d6a247"/><stop offset="100%" stop-color="#b7791f"/>
    </linearGradient>
    <linearGradient id="mC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f8db9"/><stop offset="100%" stop-color="#56639e"/>
    </linearGradient>
    <linearGradient id="mD" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <symbol id="motifA" viewBox="0 0 48 26">
      <rect x="2" y="1" width="44" height="24" rx="6" fill="url(#mA)"/>
      <text x="24" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">A</text>
    </symbol>
    <symbol id="motifB" viewBox="0 0 48 26">
      <path d="M24 1 L46 13 L24 25 L2 13 Z" fill="url(#mB)"/>
      <text x="24" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">B</text>
    </symbol>
    <symbol id="motifC" viewBox="0 0 48 26">
      <ellipse cx="24" cy="13" rx="22" ry="12" fill="url(#mC)"/>
      <text x="24" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">C</text>
    </symbol>
    <symbol id="motifD" viewBox="0 0 48 26">
      <polygon points="9,1 39,1 47,13 39,25 9,25 1,13" fill="url(#mD)"/>
      <text x="24" y="18" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">D</text>
    </symbol>

    <marker id="arrow" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#0f766e"/>
    </marker>
  </defs>

  <!-- Backdrop -->
  <rect width="1200" height="640" fill="url(#bg)"/>
  <rect width="1200" height="640" fill="url(#rightGlow)"/>
  <rect width="1200" height="640" fill="url(#leftQuiet)"/>

  <g id="hero-illustration" transform="translate(142, 18) scale(0.875)">

  <!-- ============================================================
       CARD 1 — FIMO scan: motif hits across promoters
       ============================================================ -->
  <g transform="translate(40, 48)">
    <rect width="500" height="280" rx="14" fill="#fbfefd" fill-opacity="0.9"
          stroke="#dbe5e8" stroke-opacity="0.72" stroke-width="1" filter="url(#cardShadow)"/>
    <!-- Header strip -->
    <path d="M0 0 H500 V46 H0 Z" fill="#f6faf9" fill-opacity="0.78"/>
    <line x1="0" y1="46" x2="500" y2="46" stroke="#dbe5e8" stroke-width="1"/>
    <text x="22" y="29" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="2">①  FIMO  SCAN</text>
    <text x="160" y="29" font-size="13" font-weight="500" fill="#475569">find motif hits across promoters</text>

    <!-- Promoter region with DNA backbone + motif hits -->
    <g transform="translate(28, 78)">
      <!-- Bracket marking the promoter region -->
      <path d="M0 -4 V-12 H440 V-4" fill="none" stroke="#0f766e" stroke-width="1"/>
      <text x="220" y="-18" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">
        promoter region (~1 kb upstream)
      </text>

      <!-- DNA double helix hint: two soft sine paths -->
      <path d="M0 28 C40 12, 80 44, 120 28 C160 12, 200 44, 240 28 C280 12, 320 44, 360 28 C400 12, 420 44, 440 28"
            fill="none" stroke="#334155" stroke-width="1.6" opacity="0.42"/>
      <path d="M0 28 C40 44, 80 12, 120 28 C160 44, 200 12, 240 28 C280 44, 320 12, 360 28 C400 44, 420 12, 440 28"
            fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,4" opacity="0.45"/>

      <!-- TSS flag + gene body, off the right edge of the promoter -->
      <line x1="436" y1="6" x2="436" y2="56" stroke="#dc2626" stroke-width="1.6"/>
      <polygon points="436,52 442,56 430,56" fill="#dc2626"/>
      <text x="436" y="68" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">TSS</text>

      <!-- Motif hits along the strand -->
      <use href="#motifA" x="20"  y="42" width="44" height="22"/>
      <use href="#motifB" x="100" y="42" width="44" height="22"/>
      <use href="#motifC" x="180" y="42" width="44" height="22"/>
      <use href="#motifA" x="260" y="42" width="44" height="22"/>
      <use href="#motifD" x="340" y="42" width="44" height="22"/>

      <!-- Hit annotation row -->
      <g font-size="10" fill="#94a3b8" text-anchor="middle">
        <text x="42"  y="80">hit</text>
        <text x="122" y="80">hit</text>
        <text x="202" y="80">hit</text>
        <text x="282" y="80">hit</text>
        <text x="362" y="80">hit</text>
      </g>
    </g>

    <!-- Caption — wrapped across two lines so nothing overflows. -->
    <text x="250" y="234" text-anchor="middle" font-size="12" fill="#475569">
      <tspan x="250" dy="0">For each motif, record which promoters contain a high-scoring hit</tspan>
      <tspan x="250" dy="18">→ build a <tspan font-weight="700" fill="#0f766e">homotypic index</tspan></tspan>
    </text>
  </g>

  <!-- Connector arrow card 1 → card 2 -->
  <g transform="translate(548, 188)">
    <line x1="0" y1="0" x2="32" y2="0" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="16" y="-8" text-anchor="middle" font-size="9" font-weight="600" fill="#0f766e" letter-spacing="0.5">REUSE</text>
  </g>

  <!-- ============================================================
       CARD 2 — Pairing: test every motif pair for enrichment
       ============================================================ -->
  <g transform="translate(590, 48)">
    <rect width="450" height="280" rx="14" fill="#fbfefd" fill-opacity="0.9"
          stroke="#dbe5e8" stroke-opacity="0.72" stroke-width="1" filter="url(#cardShadow)"/>
    <path d="M0 0 H450 V46 H0 Z" fill="#f6faf9" fill-opacity="0.78"/>
    <line x1="0" y1="46" x2="450" y2="46" stroke="#dbe5e8" stroke-width="1"/>
    <text x="22" y="29" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="2">②  PAIRING</text>
    <text x="135" y="29" font-size="13" font-weight="500" fill="#475569">enrichment test per motif pair</text>

    <!-- Two rows: target gene set, genome background. Each row is a
         strip + a verdict number on the right (in its own dedicated
         column at x=378+, separated from the strip area). -->

    <!-- ── TARGET GENE SET ── -->
    <g transform="translate(20, 64)">
      <rect width="416" height="76" rx="8" fill="#edf8f5" stroke="#b7dcd5" stroke-width="0.8"/>

      <!-- Title -->
      <text x="14" y="20" font-size="11" font-weight="700" fill="#134e4a" letter-spacing="0.5">TARGET GENE SET</text>
      <text x="14" y="36" font-size="10" fill="#0f766e">heat-shock, cell-type markers, etc.</text>

      <!-- Pair arcs go ABOVE the gene strip, well clear of the captions.
           Strip baseline at y=58; arcs peak at y=46. -->
      <use href="#motifA" x="180" y="50" width="32" height="18"/>
      <use href="#motifB" x="232" y="50" width="32" height="18"/>
      <path d="M196 51 C 212 39, 240 39, 248 51" fill="none" stroke="#0f766e" stroke-width="1.6"/>

      <use href="#motifA" x="58"  y="50" width="32" height="18"/>
      <use href="#motifC" x="110" y="50" width="32" height="18"/>
      <path d="M74 51 C 92 39, 120 39, 126 51" fill="none" stroke="#0f766e" stroke-width="1.6" opacity="0.7"/>

      <!-- Verdict zone, separated from the strip by ~14 px of padding -->
      <line x1="320" y1="50" x2="320" y2="68" stroke="#b7dcd5" stroke-width="1"/>
      <text x="332" y="60" font-size="13" font-weight="700" fill="#0f766e" dominant-baseline="middle">4 / 5</text>
      <text x="332" y="63" dy="13" font-size="9" fill="#0f766e">co-occur</text>
    </g>

    <!-- ── BACKGROUND ── -->
    <g transform="translate(20, 154)">
      <rect width="416" height="76" rx="8" fill="#f7faf9" stroke="#dbe5e8" stroke-width="0.8"/>

      <text x="14" y="20" font-size="11" font-weight="700" fill="#475569" letter-spacing="0.5">BACKGROUND</text>
      <text x="14" y="36" font-size="10" fill="#64748b">all genes with usable promoters</text>

      <use href="#motifA" x="58"  y="50" width="32" height="18"/>
      <use href="#motifD" x="160" y="50" width="32" height="18"/>
      <use href="#motifC" x="252" y="50" width="32" height="18"/>

      <line x1="320" y1="50" x2="320" y2="68" stroke="#dbe5e8" stroke-width="1"/>
      <text x="332" y="60" font-size="13" font-weight="700" fill="#94a3b8" dominant-baseline="middle">1 / 6</text>
      <text x="332" y="63" dy="13" font-size="9" fill="#94a3b8">co-occur</text>
    </g>

    <!-- Hypergeometric-test pill at bottom -->
    <g transform="translate(125, 244)">
      <rect width="200" height="26" rx="13" fill="#eef8f6" stroke="#bdded8" stroke-width="1"/>
      <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">
        hypergeometric pair test
      </text>
    </g>
  </g>

  <!-- Connector arrow card 2 → card 3 -->
  <g transform="translate(1048, 188)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#0f766e" stroke-width="2" marker-end="url(#arrow)"/>
  </g>

  <!-- ============================================================
       CARD 3 — Output: ranked motif pairs by adj.p
       ============================================================ -->
  <g transform="translate(1078, 48)">
    <rect width="86" height="280" rx="14" fill="#fbfefd" fill-opacity="0.9"
          stroke="#dbe5e8" stroke-opacity="0.72" stroke-width="1" filter="url(#cardShadow)"/>
    <path d="M0 0 H86 V46 H0 Z" fill="#f6faf9" fill-opacity="0.78"/>
    <line x1="0" y1="46" x2="86" y2="46" stroke="#dbe5e8" stroke-width="1"/>
    <text x="14" y="29" font-size="13" font-weight="700" fill="#0f766e" letter-spacing="2">③</text>
    <text x="32" y="29" font-size="11" font-weight="600" fill="#475569">OUTPUT</text>

    <!-- Ranked list: pair / adj.p / bar -->
    <g font-family="ui-monospace, SFMono-Regular, monospace">
      <text x="12" y="72" font-size="9" fill="#94a3b8" letter-spacing="0.5">pair  adj.p</text>

      <text x="12" y="92"  font-size="10" font-weight="700" fill="#0f766e">A+B</text>
      <text x="44" y="92"  font-size="9"  fill="#0f766e">.003</text>
      <rect x="12" y="98"  width="62" height="4" rx="2" fill="#0f766e"/>

      <text x="12" y="120" font-size="10" fill="#475569">B+C</text>
      <text x="44" y="120" font-size="9"  fill="#64748b">.07</text>
      <rect x="12" y="126" width="32" height="4" rx="2" fill="#b7791f"/>

      <text x="12" y="148" font-size="10" fill="#475569">A+C</text>
      <text x="44" y="148" font-size="9"  fill="#64748b">.21</text>
      <rect x="12" y="154" width="14" height="4" rx="2" fill="#cbd5e1"/>

      <text x="12" y="176" font-size="10" fill="#475569">C+D</text>
      <text x="44" y="176" font-size="9"  fill="#64748b">.54</text>
      <rect x="12" y="182" width="6"  height="4" rx="2" fill="#e2e8f0"/>
    </g>

    <text x="14" y="216" font-size="9" fill="#94a3b8">teal = adj.p&lt;.05</text>
  </g>

  <!-- ============================================================
       Bottom feature row — 3 value props, simple icons (no clip-art)
       ============================================================ -->
  <g transform="translate(40, 380)">
    <line x1="0" y1="0" x2="1120" y2="0" stroke="#dbe5e8" stroke-width="1"/>
  </g>

  <g transform="translate(60, 410)">
    <!-- Feature 1 -->
    <g>
      <rect width="32" height="32" rx="8" fill="#eef8f6" stroke="#bdded8" stroke-width="1"/>
      <text x="16" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">1</text>
      <text x="48" y="14" font-size="13" font-weight="700" fill="#0f172a">Pre-computed index</text>
      <text x="48" y="32" font-size="11" fill="#64748b">21 plant species × 5 motif databases — reuse for any gene list.</text>
    </g>

    <!-- Feature 2 -->
    <g transform="translate(380, 0)">
      <rect width="32" height="32" rx="8" fill="#eef8f6" stroke="#bdded8" stroke-width="1"/>
      <text x="16" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">2</text>
      <text x="48" y="14" font-size="13" font-weight="700" fill="#0f172a">Hypergeometric pair test</text>
      <text x="48" y="32" font-size="11" fill="#64748b">BH / Bonferroni correction, per-cluster or global.</text>
    </g>

    <!-- Feature 3 -->
    <g transform="translate(760, 0)">
      <rect width="32" height="32" rx="8" fill="#eef8f6" stroke="#bdded8" stroke-width="1"/>
      <text x="16" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#0f766e">3</text>
      <text x="48" y="14" font-size="13" font-weight="700" fill="#0f172a">Promoters · peaks · intervals</text>
      <text x="48" y="32" font-size="11" fill="#64748b">Same statistical engine, three input modes.</text>
    </g>
  </g>

  </g>

  <!-- Footer caption -->
  <text x="600" y="612" text-anchor="middle" font-size="12" fill="#94a3b8" letter-spacing="0.5">
    PMET — Paired Motif Enrichment Tool · finding cooperative TF activity in plant promoters
  </text>
</svg>
