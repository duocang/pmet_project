services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: apps/pmet_backend/Dockerfile
      args:
        PMET_REF: ${PMET_REF:-main}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PMET_WORKERS=2
    volumes:
      # Dev-only mounts. pmet_backend/ is mounted for uvicorn --reload and
      # celery restart-without-rebuild. data/ and result/ are runtime volumes
      # (GB-scale inputs / job outputs) that must stay on the host. Everything
      # else — scripts/, nginx/, compiled PMET binaries — is baked into the
      # image so the container is self-contained.
      - ../apps/pmet_backend:/app/pmet_backend
      - ../pipeline:/app/pipeline
      - ../data:/app/data
      - ./result:/app/result
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn pmet_backend.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../
      dockerfile: apps/pmet_backend/Dockerfile
      args:
        PMET_REF: ${PMET_REF:-main}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PMET_WORKERS=2
    volumes:
      - ../apps/pmet_backend:/app/pmet_backend
      - ../pipeline:/app/pipeline
      - ../data:/app/data
      - ./result:/app/result
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A pmet_backend.worker.celery_app worker --loglevel=info --concurrency=2

  frontend:
    build:
      context: ../apps/pmet_frontend
      dockerfile: Dockerfile
    depends_on:
      - api

  nginx:
    image: nginx:stable-alpine
    ports:
      - '5960:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./result:/var/www/result:ro
    depends_on:
      - api
      - frontend

volumes:
  redis_data:
