services:
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../
      dockerfile: apps/pmet_backend/Dockerfile
      args:
        PMET_REF: ${PMET_REF:-main}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PMET_WORKERS=2
      # Container has only app outputs, so drop the trailing /app/ — host's
      # results/app/ is mounted directly onto /app/results/.
      - PMET_RESULT_DIR_REL=results
    volumes:
      # Dev-only mounts. pmet_backend/ is mounted for uvicorn --reload and
      # celery restart-without-rebuild. data/ and results/app/ are runtime
      # volumes (GB-scale inputs / job outputs) that must stay on the host;
      # everything else — pipeline scripts, nginx config, compiled PMET
      # binaries — is baked into the image so the container is self-contained.
      - ../apps/pmet_backend:/app/pmet_backend
      - ../scripts:/app/scripts
      - ../data:/app/data
      - ../results/app:/app/results
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn pmet_backend.api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../
      dockerfile: apps/pmet_backend/Dockerfile
      args:
        PMET_REF: ${PMET_REF:-main}
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PMET_WORKERS=2
      - PMET_RESULT_DIR_REL=results
    volumes:
      - ../apps/pmet_backend:/app/pmet_backend
      - ../scripts:/app/scripts
      - ../data:/app/data
      - ../results/app:/app/results
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A pmet_backend.worker.celery_app worker --loglevel=info --concurrency=2

  liveness-watchdog:
    # Side process that scans results/app/<task_id>/progress.json and
    # kills any task that hasn't emitted progress within the threshold.
    # Runs in its own container so it can fire even when celery worker
    # slots are saturated by stuck tasks. Shares the worker's PID
    # namespace (`pid: service:worker`) so psutil can see and signal
    # the bash subprocess tree the worker spawns.
    build:
      context: ../
      dockerfile: apps/pmet_backend/Dockerfile
      args:
        PMET_REF: ${PMET_REF:-main}
    environment:
      - PMET_RESULT_DIR_REL=results
      - PMET_LIVENESS_TIMEOUT_SEC=900
      - PMET_WATCHDOG_POLL_SEC=60
    volumes:
      - ../apps/pmet_backend:/app/pmet_backend
      - ../scripts:/app/scripts
      - ../data:/app/data
      - ../results/app:/app/results
    pid: "service:worker"
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    command: python -m pmet_backend.worker.watchdog

  frontend:
    build:
      context: ../apps/pmet_frontend
      dockerfile: Dockerfile
    depends_on:
      - api

  nginx:
    image: nginx:stable-alpine
    ports:
      - '5960:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../results/app:/var/www/result:ro
    depends_on:
      - api
      - frontend

volumes:
  redis_data:
