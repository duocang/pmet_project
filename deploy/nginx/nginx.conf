events {
    worker_connections 1024;
}

http {
    # Docker's embedded DNS — re-resolve upstream hostnames at runtime so
    # rebuilding api/frontend doesn't strand nginx on a stale container IP.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Per-IP rate limit for issue-session. nginx sees the real client
    # connection IP via $binary_remote_addr — far more reliable than
    # making the FastAPI process trust a forwarded header. The shared
    # zone holds enough state to track ~160k distinct IPs at 10 MiB.
    # rate=10r/m matches the cap the previous in-app limiter enforced;
    # burst=2 absorbs the legit "submit page mounts twice in quick
    # succession" case without 429ing real users. Without nodelay the
    # bursts queue at 10r/m which is annoyingly slow; with nodelay the
    # burst is admitted immediately and only requests beyond it 429.
    limit_req_zone $binary_remote_addr zone=issue_session:10m rate=10r/m;
    # Default 503 reads as a server fault; 429 is the right code for
    # "you're going too fast, retry later" and matches what the in-app
    # limiter used to return.
    limit_req_status 429;

    server {
        listen 80;
        server_name _;

        # Frontend
        location / {
            set $frontend_upstream "frontend:3000";
            proxy_pass http://$frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Issue-session — narrower location block to attach the
        # per-IP limit_req. Must precede the broader /api/ block so it
        # wins the longest-prefix match. Forwards to the same upstream
        # with the same headers; the limit is the only difference.
        location = /api/files/issue-session {
            limit_req zone=issue_session burst=2 nodelay;
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API
        location /api/ {
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Large file uploads — matches backend _UPLOAD_MAX_BYTES (1 GB
            # raw). Anything larger is rejected by the app layer anyway,
            # but stopping at the edge avoids spooling the body to disk.
            client_max_body_size 1G;
            # 600s rather than the 60s default — covers slow-network downloads
            # of GB-scale partial-result files (motif_output.txt). The
            # endpoint also sets X-Accel-Buffering: no so nginx streams chunks
            # straight through instead of buffering the whole response first.
            proxy_read_timeout 600s;
        }

        # Health endpoint
        location /health {
            set $api_upstream "api:8000";
            proxy_pass http://$api_upstream/health;
        }

        # Result files
        location /result/ {
            alias /var/www/result/;
            autoindex on;
        }
    }
}
